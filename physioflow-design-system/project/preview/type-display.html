<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--background);
      }
      .card {
        padding: 28px 32px;
        box-sizing: border-box;
        min-height: 100vh;
      }
      .row {
        display: flex;
        align-items: baseline;
        gap: 20px;
        margin-bottom: 10px;
      }
      .tag {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--muted-foreground);
        width: 90px;
        flex-shrink: 0;
      }
      h1,
      h2,
      h3 {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row">
        <span class="tag">h1 · Fraunces 36</span>
        <h1>Olá, bem-vindo</h1>
      </div>
      <div class="row">
        <span class="tag">h2 · Fraunces 30</span>
        <h2>Diretório de Pacientes</h2>
      </div>
      <div class="row">
        <span class="tag">h3 · Fraunces 24</span>
        <h3>Documentos clínicos</h3>
      </div>
      <div class="row">
        <span class="tag">h4 · Jakarta 17 / 600</span>
        <h4>Relatório de evolução</h4>
      </div>
    </div>
  </body>
</html>
