<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--background);
      }
      .card {
        padding: 24px 28px;
        box-sizing: border-box;
        min-height: 100vh;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .chip {
        font-family: var(--font-body);
        font-weight: 600;
        font-size: 13px;
        padding: 9px 16px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--foreground);
        cursor: pointer;
      }
      .chip.on {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .badge {
        font-family: var(--font-body);
        font-weight: 700;
        font-size: 10.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 5px 10px;
        border-radius: 999px;
      }
      .b-dom {
        background: var(--accent-soft);
        color: var(--accent-soft-fg);
      }
      .b-act {
        background: var(--primary-soft);
        color: var(--primary-soft-fg);
      }
      .b-real {
        background: var(--success-soft);
        color: var(--success);
      }
      .b-deb {
        background: var(--muted);
        color: var(--muted-foreground);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <button class="chip on">Todos</button>
      <button class="chip">Fisioterapia motora</button>
      <button class="chip">Pilates</button>
      <button class="chip">Atendimento domiciliar</button>
      <span style="flex-basis: 100%; height: 4px"></span>
      <span class="badge b-dom">🏠 Domiciliar</span>
      <span class="badge b-act">Agendado</span>
      <span class="badge b-real">Realizado</span>
      <span class="badge b-deb">Paciente debilitado</span>
    </div>
  </body>
</html>
