<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--background);
      }
      .card {
        padding: 28px 32px;
        box-sizing: border-box;
        min-height: 100vh;
      }
      .row {
        display: flex;
        align-items: baseline;
        gap: 20px;
        margin-bottom: 12px;
      }
      .tag {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--muted-foreground);
        width: 110px;
        flex-shrink: 0;
      }
      p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row">
        <span class="tag">body · 15</span>
        <p>Acompanhe seus pacientes e a documentação clínica.</p>
      </div>
      <div class="row">
        <span class="tag">body muted</span>
        <p class="t-muted">Mantenha os atendimentos em dia para sustentar a evolução.</p>
      </div>
      <div class="row">
        <span class="tag">small</span>
        <p style="font-size: 13.5px">Histórico cronológico das suas sessões.</p>
      </div>
      <div class="row">
        <span class="tag">label</span><span class="t-label">PORTAL RESTAURATIVO</span>
      </div>
      <div class="row">
        <span class="tag">eyebrow</span><span class="t-eyebrow">ÚLTIMOS 7 DIAS</span>
      </div>
    </div>
  </body>
</html>
