<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--background);}
  .card{padding:0;box-sizing:border-box;min-height:100vh;display:flex;}
  .sb{width:230px;background:var(--background);border-right:1px solid var(--border);padding:22px 16px;display:flex;flex-direction:column;gap:2px;}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:26px;padding:2px 8px;}
  .mark{width:36px;height:36px;border-radius:11px;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .wm{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--foreground);line-height:1;letter-spacing:-0.01em;}
  .sub{font-family:var(--font-body);font-size:8.5px;font-weight:700;letter-spacing:.22em;color:var(--muted-foreground);text-transform:uppercase;margin-top:4px;line-height:1.4;}
  .it{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;font-family:var(--font-body);font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-foreground);cursor:pointer;}
  .it:hover{background:var(--muted);}
  .it.on{background:var(--primary);color:#fff;box-shadow:0 10px 24px -10px oklch(0.52 0.05 160 / .5);}
  .ico{width:18px;height:18px;flex-shrink:0;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;fill:none;stroke:currentColor;}
  .dummy{flex:1;padding:24px;color:var(--muted-foreground);font-size:13px;font-family:var(--font-body);}
  .dummy code{background:var(--muted);padding:2px 6px;border-radius:6px;font-size:12px;}
</style></head>
<body><div class="card">
  <div class="sb">
    <div class="logo">
      <div class="mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-5 4 10 2-5h6"/></svg>
      </div>
      <div><div class="wm">PhisioFlow</div><div class="sub">Portal<br>Restaurativo</div></div>
    </div>
    <div class="it">
      <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </div>
    <div class="it on">
      <svg class="ico" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Pacientes
    </div>
    <div class="it">
      <svg class="ico" viewBox="0 0 24 24"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h4"/></svg>
      Atendimentos
    </div>
    <div class="it">
      <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Agenda
    </div>
    <div class="it">
      <svg class="ico" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      Documentos
    </div>
  </div>
  <div class="dummy">Sidebar: <code>w-64</code>, active state uses <code>--primary</code> with <code>shadow-glow</code>.</div>
</div></body></html>
