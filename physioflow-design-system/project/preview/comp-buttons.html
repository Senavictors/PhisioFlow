<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--background);}
  .card{padding:24px 28px;box-sizing:border-box;min-height:100vh;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .btn{font-family:var(--font-body);font-weight:600;font-size:14px;padding:11px 18px;border-radius:12px;border:none;cursor:pointer;transition:all 180ms cubic-bezier(.2,.7,.2,1);}
  .p{background:var(--accent);color:#fff;box-shadow:0 8px 16px -8px oklch(0.72 0.09 45 / .4);}
  .p:hover{background:var(--accent-hover);}
  .s{background:var(--primary);color:#fff;}
  .s:hover{background:var(--primary-hover);}
  .g{background:var(--card);color:var(--foreground);border:1px solid var(--border);}
  .g:hover{background:var(--muted);}
  .gh{background:transparent;color:var(--foreground);}
  .gh:hover{background:var(--muted);}
</style></head>
<body><div class="card">
  <button class="btn p">+ Cadastrar paciente</button>
  <button class="btn s">+ Novo agendamento</button>
  <button class="btn g">Ver atendimentos</button>
  <button class="btn gh">Cancelar</button>
</div></body></html>
