<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--background);
      }
      .card {
        padding: 20px 28px;
        box-sizing: border-box;
        min-height: 100vh;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .ico {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: var(--card);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--foreground);
      }
      .ico.s {
        background: var(--primary-soft);
        color: var(--primary-soft-fg);
        border-color: transparent;
      }
      .ico.t {
        background: var(--accent-soft);
        color: var(--accent-soft-fg);
        border-color: transparent;
      }
      svg {
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke: currentColor;
      }
      .cap {
        flex-basis: 100%;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--muted-foreground);
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="ico">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
      </div>
      <div class="ico">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
      </div>
      <div class="ico">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <rect x="4" y="3" width="16" height="18" rx="2" />
          <path d="M9 7h6M9 11h6M9 15h4" />
        </svg>
      </div>
      <div class="ico">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <path d="M16 2v4M8 2v4M3 10h18" />
        </svg>
      </div>
      <div class="ico">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" />
        </svg>
      </div>
      <div class="ico s">
        <svg width="22" height="22" viewBox="0 0 24 24"><path d="M3 12h4l2-5 4 10 2-5h6" /></svg>
      </div>
      <div class="ico t">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <path d="M6 2v6a6 6 0 0 0 12 0V2" />
          <circle cx="20" cy="14" r="2" />
          <path d="M8 2h2M14 2h2" />
        </svg>
      </div>
      <div class="ico t">
        <svg width="22" height="22" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4z" /></svg>
      </div>
      <div class="ico s">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <path d="M9 11 12 14 22 4" />
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
        </svg>
      </div>
      <div class="cap">Lucide — line, 1.75px stroke. Tinted squares for status contexts.</div>
    </div>
  </body>
</html>
