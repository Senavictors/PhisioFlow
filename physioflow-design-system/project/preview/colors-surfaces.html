<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--background);}
  .card{padding:24px 28px;min-height:calc(100vh - 0px);box-sizing:border-box;display:flex;align-items:center;}
  .row{display:flex;gap:16px;flex-wrap:wrap;width:100%;}
  .sw{display:flex;flex-direction:column;gap:8px;flex:1;min-width:100px;}
  .chip{height:68px;border-radius:14px;box-shadow:var(--shadow-xs);border:1px solid var(--border);}
  .lbl{font-family:var(--font-body);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--muted-foreground);}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);}
  .name{font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--foreground);}
</style></head>
<body><div class="card"><div class="row">
  <div class="sw"><div class="chip" style="background:var(--background)"></div><div class="name">Background</div><div class="lbl">--background</div><div class="val">oklch(0.985 0.008 85)</div></div>
  <div class="sw"><div class="chip" style="background:var(--card)"></div><div class="name">Card</div><div class="lbl">--card</div><div class="val">oklch(1 0 0)</div></div>
  <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="name">Muted</div><div class="lbl">--muted</div><div class="val">oklch(0.95 0.01 85)</div></div>
  <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="name">Border</div><div class="lbl">--border</div><div class="val">oklch(0.9 0.012 85)</div></div>
</div></div></body></html>
