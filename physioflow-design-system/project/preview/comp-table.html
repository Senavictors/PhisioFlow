<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--background);}
  .card{padding:24px 28px;box-sizing:border-box;min-height:100vh;display:flex;flex-direction:column;gap:18px;justify-content:center;}
  .tbl{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
  .th,.tr{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 40px;padding:14px 20px;align-items:center;gap:12px;font-family:var(--font-body);font-size:13.5px;}
  .th{border-bottom:1px solid var(--border);font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-foreground);}
  .tr+.tr{border-top:1px solid var(--border);}
  .tr:hover{background:oklch(0.95 0.01 85 / .5);}
  .av{width:32px;height:32px;border-radius:999px;background:var(--primary-soft);color:var(--primary-soft-fg);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-right:10px;}
  .pat{display:flex;align-items:center;}
  .nm{font-weight:600;}
  .id{font-size:11.5px;color:var(--muted-foreground);}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;background:var(--muted);color:var(--muted-foreground);}
  .dot{width:6px;height:6px;border-radius:999px;background:var(--success);display:inline-block;margin-right:6px;vertical-align:middle;}
  .dom{font-size:10px;color:var(--accent-soft-fg);background:var(--accent-soft);padding:3px 8px;border-radius:999px;margin-left:6px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
</style></head>
<body><div class="card"><div class="tbl">
  <div class="th"><span>Paciente</span><span>Classificação</span><span>Cadastro</span><span>Status</span><span></span></div>
  <div class="tr"><div class="pat"><span class="av">G</span><div><div class="nm">Gervasio</div><div class="id">ID: EEC64018</div></div></div><span class="pill">Paciente debilitado</span><span>📅 23/04/2026</span><span><span class="dot"></span>Plano ativo <span class="dom">Domic.</span></span><span style="color:var(--muted-foreground)">⋯</span></div>
  <div class="tr"><div class="pat"><span class="av">M</span><div><div class="nm">Marina</div><div class="id">ID: A3B81204</div></div></div><span class="pill">Pós-cirúrgico</span><span>📅 17/04/2026</span><span><span class="dot"></span>Plano ativo</span><span style="color:var(--muted-foreground)">⋯</span></div>
</div></div></body></html>
