<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--background);}
  .card{padding:24px 28px;box-sizing:border-box;min-height:100vh;display:flex;flex-direction:column;gap:16px;justify-content:center;}
  .row{display:flex;gap:16px;align-items:center;}
  .b{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 22px;flex:1;}
  .lbl{font-family:var(--font-body);font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-foreground);margin-bottom:8px;}
  .chip{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);}
  .r-sm{width:60px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:8px;}
  .r-md{width:60px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:12px;}
  .r-lg{width:60px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:18px;}
  .r-full{width:60px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:999px;}
  .sh{width:80px;height:50px;background:var(--card);border-radius:14px;}
  .s1{box-shadow:var(--shadow-xs);} .s2{box-shadow:var(--shadow-sm);} .s3{box-shadow:var(--shadow-md);} .s4{box-shadow:var(--shadow-glow);}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="b"><div class="lbl">Radii</div>
      <div style="display:flex;gap:12px;align-items:center;"><div class="r-sm"></div><div class="r-md"></div><div class="r-lg"></div><div class="r-full"></div></div>
      <div class="chip" style="margin-top:8px">8 · 12 · 18 · full</div>
    </div>
    <div class="b"><div class="lbl">Shadows</div>
      <div style="display:flex;gap:16px;align-items:center;padding:6px 0;"><div class="sh s1"></div><div class="sh s2"></div><div class="sh s3"></div><div class="sh s4" style="background:var(--primary)"></div></div>
      <div class="chip" style="margin-top:8px">xs · sm · md · glow</div>
    </div>
  </div>
</div></body></html>
