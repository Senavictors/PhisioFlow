<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--background);
      }
      .card {
        padding: 24px 28px;
        box-sizing: border-box;
        min-height: 100vh;
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .c {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 22px;
        flex: 1;
        box-shadow: var(--shadow-sm);
      }
      .ico {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 14px;
      }
      .s {
        background: var(--primary-soft);
        color: var(--primary-soft-fg);
      }
      .t {
        background: var(--accent-soft);
        color: var(--accent-soft-fg);
      }
      h4 {
        margin: 0 0 6px;
        font-family: var(--font-body);
        font-weight: 600;
        font-size: 15px;
      }
      p {
        margin: 0;
        font-size: 13px;
        color: var(--muted-foreground);
        line-height: 1.5;
      }
      .hero {
        flex: 1.4;
        background: var(--primary);
        color: #fff;
        border-radius: 18px;
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .hero h3 {
        margin: 0;
        color: #fff;
        font-family: var(--font-display);
        font-size: 22px;
        font-weight: 700;
      }
      .hero p {
        color: oklch(1 0 0 / 0.85);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="c">
        <div class="ico s">📄</div>
        <h4>Relatório de evolução</h4>
        <p>Resumo clínico do progresso do paciente ao longo das sessões.</p>
      </div>
      <div class="c">
        <div class="ico t">🩺</div>
        <h4>Laudo fisioterapêutico</h4>
        <p>Avaliação técnica detalhada com diagnóstico cinético-funcional.</p>
      </div>
      <div class="hero">
        <h3>Progresso Restaurativo</h3>
        <p>Você acompanha 1 pacientes ativos. Mantenha os atendimentos em dia.</p>
      </div>
    </div>
  </body>
</html>
